<nav *ngIf="totalPages > 1" class="pagination-nav" aria-label="Paginación">
  <!-- Info -->
  <div class="pagination-info mb-3">
    <small class="text-muted">
      Mostrando {{ startItem }}-{{ endItem }} de {{ totalItems }} resultados
    </small>
  </div>

  <!-- Pagination -->
  <ul class="pagination justify-content-center">
    <!-- First Page -->
    <li class="page-item" *ngIf="showFirstLast" [class.disabled]="isPageDisabled(1)">
      <button class="page-link" 
              (click)="goToFirst()" 
              [disabled]="isPageDisabled(1)"
              aria-label="Primera página">
        <i class="fa fa-angle-double-left"></i>
        <span class="d-none d-md-inline ms-1">Primera</span>
      </button>
    </li>

    <!-- Previous Page -->
    <li class="page-item" *ngIf="showPrevNext" [class.disabled]="!hasPrevPage">
      <button class="page-link" 
              (click)="goToPrev()" 
              [disabled]="!hasPrevPage"
              aria-label="Página anterior">
        <i class="fa fa-angle-left"></i>
        <span class="d-none d-md-inline ms-1">Anterior</span>
      </button>
    </li>

    <!-- Page Numbers -->
    <li class="page-item" 
        *ngFor="let page of pages" 
        [class.active]="isPageActive(page)">
      <button class="page-link" 
              (click)="goToPage(page)"
              [attr.aria-current]="isPageActive(page) ? 'page' : null">
        {{ page }}
      </button>
    </li>

    <!-- Next Page -->
    <li class="page-item" *ngIf="showPrevNext" [class.disabled]="!hasNextPage">
      <button class="page-link" 
              (click)="goToNext()" 
              [disabled]="!hasNextPage"
              aria-label="Página siguiente">
        <span class="d-none d-md-inline me-1">Siguiente</span>
        <i class="fa fa-angle-right"></i>
      </button>
    </li>

    <!-- Last Page -->
    <li class="page-item" *ngIf="showFirstLast" [class.disabled]="isPageDisabled(totalPages)">
      <button class="page-link" 
              (click)="goToLast()" 
              [disabled]="isPageDisabled(totalPages)"
              aria-label="Última página">
        <span class="d-none d-md-inline me-1">Última</span>
        <i class="fa fa-angle-double-right"></i>
      </button>
    </li>
  </ul>

  <!-- Page Size Selector (Optional) -->
  <div class="pagination-options mt-3">
    <div class="row align-items-center">
      <div class="col-md-6">
        <small class="text-muted">
          Página {{ currentPage }} de {{ totalPages }}
        </small>
      </div>
      <div class="col-md-6 text-md-end">
        <select class="form-select form-select-sm d-inline-block w-auto" 
                [value]="itemsPerPage"
                (change)="onItemsPerPageChange($event)">
          <option value="10">10 por página</option>
          <option value="25">25 por página</option>
          <option value="50">50 por página</option>
          <option value="100">100 por página</option>
        </select>
      </div>
    </div>
  </div>
</nav>
