<div class="login-container">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div class="login-card">
          <!-- Header -->
          <div class="text-center mb-4">
            <h2 class="login-title">
              <i class="fa fa-sign-in me-2"></i>
              Iniciar Sesión
            </h2>
            <p class="text-muted">Bienvenido de nuevo</p>
          </div>

          <!-- Error Alert -->
          <div *ngIf="error" class="alert alert-danger" role="alert">
            <i class="fa fa-exclamation-triangle me-2"></i>
            {{ error }}
          </div>

          <!-- Login Form -->
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <!-- Username Field -->
            <div class="mb-3">
              <label for="username" class="form-label">
                <i class="fa fa-user me-1"></i>
                Nombre de Usuario
              </label>
              <input type="text" 
                     class="form-control" 
                     id="username" 
                     formControlName="username"
                     [class.is-invalid]="submitted && f['username'].errors"
                     placeholder="Ingresa tu nombre de usuario"
                     autocomplete="username">
              <div *ngIf="submitted && f['username'].errors" class="invalid-feedback">
                <div *ngIf="f['username'].errors['required']">
                  El nombre de usuario es requerido
                </div>
              </div>
            </div>

            <!-- Password Field -->
            <div class="mb-3">
              <label for="password" class="form-label">
                <i class="fa fa-lock me-1"></i>
                Contraseña
              </label>
              <div class="input-group">
                <input [type]="hidePassword ? 'password' : 'text'" 
                       class="form-control" 
                       id="password" 
                       formControlName="password"
                       [class.is-invalid]="submitted && f['password'].errors"
                       placeholder="Ingresa tu contraseña"
                       autocomplete="current-password">
                <button type="button" 
                        class="btn btn-outline-secondary" 
                        (click)="togglePasswordVisibility()">
                  <i class="fa" [class]="hidePassword ? 'fa-eye' : 'fa-eye-slash'"></i>
                </button>
              </div>
              <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
                <div *ngIf="f['password'].errors['required']">
                  La contraseña es requerida
                </div>
                <div *ngIf="f['password'].errors['minlength']">
                  La contraseña debe tener al menos 6 caracteres
                </div>
              </div>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe">
                <label class="form-check-label" for="rememberMe">
                  Recordarme
                </label>
              </div>
              <a href="#" class="text-decoration-none" (click)="forgotPassword()">
                ¿Olvidaste tu contraseña?
              </a>
            </div>

            <!-- Submit Button -->
            <div class="d-grid">
              <button type="submit" 
                      class="btn btn-primary btn-lg" 
                      [disabled]="loading">
                <span *ngIf="!loading">
                  <i class="fa fa-sign-in me-2"></i>
                  Iniciar Sesión
                </span>
                <span *ngIf="loading">
                  <i class="fa fa-spinner fa-spin me-2"></i>
                  Iniciando...
                </span>
              </button>
            </div>
          </form>

          <!-- Register Link -->
          <div class="text-center mt-4">
            <p class="mb-0">
              ¿No tienes una cuenta?
              <a href="#" class="text-decoration-none" (click)="goToRegister()">
                Regístrate aquí
              </a>
            </p>
          </div>

          <!-- Social Login (Optional) -->
          <div class="social-login mt-4">
            <div class="text-center mb-3">
              <span class="text-muted">O inicia sesión con</span>
            </div>
            <div class="d-grid gap-2">
              <button type="button" class="btn btn-outline-primary">
                <i class="fa fa-google me-2"></i>
                Google
              </button>
              <button type="button" class="btn btn-outline-secondary">
                <i class="fa fa-github me-2"></i>
                GitHub
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
